services:
  # Single service: FastAPI serves both the API and the built React SPA.
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      YOUTUBE_CACHE_ENABLED: "true"
      PORT: "8417"
    volumes:
      - youtube_cache:/app/.youtube_cache
    ports:
      - "${APP_PORT:-8417}:8417"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8417/api/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  youtube_cache:
